services:
  - type: web
    name: foodvision-ai
    env: python
    plan: free
    pythonVersion: "3.10.0"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1 --threads 2
    healthCheckPath: /api/status
    envVars:
      - key: FLASK_DEBUG
        value: "False"
      - key: PYTHONUNBUFFERED
        value: "1"
